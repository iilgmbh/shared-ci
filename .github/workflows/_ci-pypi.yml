# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: PyPI Library CI (Lint, Secret-Scan, Test, Audit)       ║
# ║  Usage: uses: iilgmbh/shared-ci/.github/workflows/_ci-pypi.yml@main    ║
# ║  ADR-226: binding CI for every PyPI-published platform package.            ║
# ║  Library-shaped — NO Django settings, NO Postgres. Apps use _ci-python.yml ║
# ║  Caller needs only `permissions: { contents: read }` (secret-scan is       ║
# ║  GitHub-API-free, so the #191/#198 permission-narrowing trap cannot recur).║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: PyPI Library CI

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version for single-version jobs (lint, secret-scan, build, mypy, security)'
        required: false
        default: '3.12'
        type: string
      python_versions:
        description: >-
          JSON list of Python versions the *test* job runs as a matrix.
          Libraries publish to PyPI and must support a range — apps pin one
          Python, libraries do not (ADR-226). Default = single 3.12 so existing
          single-version behaviour is preserved until a package opts into a
          wider range, e.g. '["3.10","3.11","3.12","3.13"]'.
        required: false
        default: '["3.12"]'
        type: string
      coverage_threshold:
        description: 'Minimum coverage % — CI fails below this (ADR-058)'
        required: false
        default: 80
        type: number
      install_extra:
        description: 'Optional-dependencies extra to install: pip install -e ".[<extra>]"'
        required: false
        default: 'dev'
        type: string
      cov_package:
        description: 'Import package for --cov=<pkg> (empty = rely on pyproject addopts)'
        required: false
        default: ''
        type: string
      test_path:
        description: 'Path passed to pytest'
        required: false
        default: 'tests/'
        type: string
      pytest_args:
        description: 'Extra pytest args'
        required: false
        default: ''
        type: string
      ruff_version:
        description: 'Pinned ruff version (e.g. ==0.15.4). Empty = latest. Pin to pyproject required-version.'
        required: false
        default: '==0.15.4'
        type: string
      enable_mypy:
        description: 'Run mypy (non-blocking)'
        required: false
        default: false
        type: boolean
      mypy_args:
        description: 'mypy target/args'
        required: false
        default: '.'
        type: string
      mypy_blocking:
        description: >-
          mypy als bindendes Gate (Retro e17299 F6: blockierendes mypy darf bei
          Konvergenz-Migrationen nicht still entfallen). Default false = non-blocking.
        required: false
        default: false
        type: boolean
      enable_bandit:
        description: 'Run bandit SAST (non-blocking)'
        required: false
        default: false
        type: boolean
      bandit_args:
        description: 'bandit target/args'
        required: false
        default: '-r src/'
        type: string
      enable_build:
        description: >-
          Build the distribution (python -m build), validate metadata
          (twine check) and scan the *built sdist* for secrets. ADR-226
          decision driver #1 is "secret leakage in a published wheel/sdist
          is irreversible" — the history scan does NOT cover secrets that
          enter the artifact via MANIFEST.in / package_data without a clean
          history trail. Blocking by default; this is the publish-vector gate.
        required: false
        default: true
        type: boolean
      enable_security_scan:
        description: 'Run pip-audit + pip check'
        required: false
        default: true
        type: boolean
      block_pip_audit:
        description: >-
          Make pip-audit (CVE scan) blocking. Default true for libraries:
          ADR-226 premise is that published artifacts have the widest,
          irreversible blast radius — shipping a known-CVE dependency in a
          public wheel is worse than in an internal app, so the app-CI
          "non-blocking for parity" stance is deliberately NOT inherited here.
        required: false
        default: true
        type: boolean
      runs_on:
        description: 'Runner label (libraries register no self-hosted runner → ubuntu-latest)'
        required: false
        default: 'ubuntu-latest'
        type: string

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install ruff
        run: pip install "ruff${{ inputs.ruff_version }}"
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .

  # ── Secret Detection ──────────────────────────────────────────────────────
  # Single source of the #198-hardened logic: the shared `gitleaks-scan`
  # composite action (ADR-226 DRY resolution — preferred over a
  # _secrets-scan.yml reusable: steps-only, no nested-reusable limits, repo
  # already uses composite actions). _ci-python.yml + this job + the build
  # job below all consume the SAME action — no divergence possible.
  secrets-scan:
    name: "Secret Detection (gitleaks)"
    runs-on: ${{ inputs.runs_on }}
    # Blocking gate: a secrets scanner that silently goes green helps no one.
    # NOTE: deliberately NO job-level `permissions:` block and NO GitHub API
    # call. A called reusable workflow can only NARROW the caller's
    # GITHUB_TOKEN, never grant (see #191/#198). The composite action runs the
    # gitleaks CLI against full local history — zero GitHub API, zero token
    # coupling. ESCAPE HATCH: repo-root `.gitleaksignore` (fingerprint,
    # preferred) or `.gitleaks.toml` (rule allowlist), both auto-honored and
    # echoed by the action. Template: platform docs/templates/.gitleaks.toml.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret scan (git history)
        uses: iilgmbh/shared-ci/.github/actions/gitleaks-scan@main
        with:
          mode: history
          source: .
          context_label: "git history"

  test:
    name: "Test & Coverage py${{ matrix.python }} (≥ ADR-058 gate)"
    runs-on: ${{ inputs.runs_on }}
    strategy:
      fail-fast: false   # one Python version failing must not hide the others
      matrix:
        python: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Resolve install extra (fail loud on wrong extra name)
        id: extra
        uses: iilgmbh/shared-ci/.github/actions/resolve-install-extra@main
        with:
          install_extra: ${{ inputs.install_extra }}
      - name: Install package + extras
        run: |
          python -m pip install -U pip
          pip install -e "${{ steps.extra.outputs.spec }}"
          # The reusable MANDATES the ADR-058 coverage gate, so it must
          # guarantee its own tooling regardless of whether the package
          # declares it in its extra (verified: promptfw [dev] lacked
          # pytest-cov → --cov unrecognized). Self-sufficient by design.
          pip install pytest pytest-cov
      - name: pytest + coverage gate
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.cov_package }}" ]; then
            # Explicit cov source given → enforce the ADR-058 gate on CLI.
            pytest ${{ inputs.test_path }} -v --tb=short \
              --cov=${{ inputs.cov_package }} --cov-report=term-missing \
              --cov-fail-under=${{ inputs.coverage_threshold }} \
              ${{ inputs.pytest_args }}
          else
            # No cov source → pyproject [tool.pytest.ini_options] addopts owns
            # --cov / --cov-fail-under (adding --cov-fail-under without --cov
            # would error). coverage_threshold input is intentionally ignored.
            pytest ${{ inputs.test_path }} -v --tb=short ${{ inputs.pytest_args }}
          fi

  # ── Build + Publish-Vector Secret Scan ────────────────────────────────────
  # The `secrets-scan` job scans git HISTORY. ADR-226's stated threat is
  # "secret leakage in a published wheel/sdist" — a secret can enter the
  # *artifact* via MANIFEST.in / package_data / setuptools data-files without
  # ever being a clean history finding. This job builds the real distribution
  # and scans the UNPACKED sdist (the bytes that actually reach PyPI), closing
  # the gap between the cited threat model and the control. It also fails the
  # build on broken packaging metadata (twine check) BEFORE it reaches the
  # public index — a "library CI" that never builds the library is incomplete.
  build:
    name: "Build & Publish-Vector Scan"
    if: ${{ inputs.enable_build }}
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Build sdist + wheel
        run: |
          set -euo pipefail
          python -m pip install -U pip build twine
          python -m build
          ls -la dist/
      - name: twine check (packaging metadata valid for PyPI)
        run: twine check --strict dist/*
      - name: Scan built artifact for secrets (the bytes that reach PyPI)
        # Shared composite action, mode=sdist: it locates+extracts the sdist
        # AND the wheel from dist/ and scans them — the SAME control wired
        # into every publish-*.yml (ADR-226 binding gate). Blocking: a secret
        # in the published artifact is irreversible (rotate + yank).
        uses: iilgmbh/shared-ci/.github/actions/gitleaks-scan@main
        with:
          mode: sdist
          source: dist
          report_escape_hatch: "false"
          context_label: "built artifact"
          triage_hint: "A secret is present in the artifact that would be PUBLISHED. ROTATE it and exclude it from the build (MANIFEST.in / package_data / [tool.setuptools] exclude). Do NOT suppress on intent — the artifact must not ship it."

  mypy:
    name: "Type Check (mypy${{ inputs.mypy_blocking && ', blocking' || ', non-blocking' }})"
    if: ${{ inputs.enable_mypy }}
    runs-on: ${{ inputs.runs_on }}
    # mypy zählt im gate nur bei mypy_blocking (continue-on-error setzt sonst success)
    continue-on-error: ${{ !inputs.mypy_blocking }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Resolve install extra
        id: extra
        uses: iilgmbh/shared-ci/.github/actions/resolve-install-extra@main
        with:
          install_extra: ${{ inputs.install_extra }}
      - name: Install package + extras
        run: pip install -e "${{ steps.extra.outputs.spec }}" mypy
      - name: mypy
        run: mypy ${{ inputs.mypy_args }} --ignore-missing-imports

  security:
    name: "Security Scan (pip-audit + pip check)"
    if: ${{ inputs.enable_security_scan }}
    runs-on: ${{ inputs.runs_on }}
    # NOT job-level continue-on-error: unlike app CI, a published library's
    # deps ship to every consumer. block_pip_audit (default true) decides
    # whether a CVE is a hard fail; pip check (dependency conflicts in a
    # published package) is always blocking.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Resolve install extra
        id: extra
        uses: iilgmbh/shared-ci/.github/actions/resolve-install-extra@main
        with:
          install_extra: ${{ inputs.install_extra }}
      - name: Install package
        run: pip install -e "${{ steps.extra.outputs.spec }}" pip-audit
      - name: pip check — dependency conflicts (blocking)
        run: |
          pip check && echo "✅ No dependency conflicts" || {
            echo "❌ Dependency conflicts — a published wheel must resolve cleanly"; exit 1; }
      - name: pip-audit — CVE scan (installed env)
        run: |
          set -euo pipefail
          if [ "${{ inputs.block_pip_audit }}" = "true" ]; then
            pip-audit --format=columns \
              && echo "✅ No known CVEs" \
              || { echo "❌ CVEs in a to-be-published artifact — blocking (set block_pip_audit:false to downgrade with justification)"; exit 1; }
          else
            pip-audit --format=columns \
              && echo "✅ No known CVEs" \
              || echo "⚠️  CVEs found — see output above (non-blocking per caller opt-out)"
          fi

  bandit:
    name: "SAST (bandit, non-blocking)"
    if: ${{ inputs.enable_bandit }}
    runs-on: ${{ inputs.runs_on }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: bandit
        run: |
          pip install -q bandit
          bandit ${{ inputs.bandit_args }}

  gate:
    # Portiert 1:1 aus platform/_ci-pypi.yml (Job-Katalog-Diff verifiziert,
    # KONZ-018 W1-1): identischer Katalog lint/secrets-scan/test/build/mypy/
    # security/bandit, keine zusätzlichen if:-Bedingungen außer den bereits
    # hier vorhandenen enable_*-Opt-ins (build/mypy/security/bandit) — 'skipped'
    # zählt wie im Original als Pass. Schließt die Gate-Regression, die shared-ci
    # gegenüber platform hatte (promptfw konsumierte die ungegatete Variante).
    name: "gate"
    runs-on: ${{ inputs.runs_on }}
    needs: [lint, secrets-scan, test, build, mypy, security, bandit]
    if: always()
    steps:
      - name: "All CI jobs passed or skipped"
        run: |
          STATUS_LIST='${{ toJSON(needs) }}'
          echo "$STATUS_LIST" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failures = [name for name, job in needs.items() if job['result'] not in ('success', 'skipped')]
          if failures:
              print('::error::Failed or cancelled jobs:', failures)
              sys.exit(1)
          print('All jobs passed or were skipped.')
          "
