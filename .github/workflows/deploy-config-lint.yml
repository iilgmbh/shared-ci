name: "Deploy-Config-Lint"

# Org-Gate gegen den Auto-Prod-Deploy-Drift (risk-hub-Klasse): deploy.yml, das
# push->main auf 'production' defaultet, deployt unbemerkt direkt auf Prod.
# Org-Standard (_deploy-unified.yml): push->main = staging; Prod nur Tag/manuell.
# Hintergrund: session-retro 2026-06-04 (risk-hub ~20 Tage Auto-Prod).
#
# Portiert aus achimdehnert/platform (KONZ-002 OOTB-A/OOTB-5): Lint-Script jetzt
# in diesem Repo (tools/deploy_config_lint.py) — keine platform-Kopplung mehr.
#
# Adoption im Repo-CI:
#   jobs:
#     deploy-config-lint:
#       uses: iilgmbh/shared-ci/.github/workflows/deploy-config-lint.yml@v1.0.1

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  deploy-config-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          path: caller
      - name: Checkout shared-ci (Lint-Script)
        uses: actions/checkout@v4
        with:
          repository: iilgmbh/shared-ci
          # immutable: SHA der reusable-Workflow-Datei = exakt der vom Caller
          # gepinnte Stand (@v1.0.1). Kein mutable `main` (Supply-Chain, Retro #3).
          ref: ${{ github.workflow_sha }}
          path: shared-ci
      - name: Lint deploy-Workflows gegen Auto-Prod-Default
        run: python3 shared-ci/tools/deploy_config_lint.py caller/.github/workflows
