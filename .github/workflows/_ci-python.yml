# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: Python CI (Lint, Test, Security)                       ║
# ║  Usage: uses: iilgmbh/shared-ci/.github/workflows/_ci-python.yml@main  ║
# ║  ADR-057 Phase 1: split test-unit / test-integration / coverage-report     ║
# ║  ADR-058: coverage_threshold=80 default, platform-context[testing] auto    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        default: '3.12'
        type: string
      coverage_threshold:
        description: 'Minimum coverage % — CI fails below this (ADR-058)'
        required: false
        default: 80
        type: number
      requirements_file:
        description: 'Path to requirements.txt'
        required: false
        default: 'requirements.txt'
        type: string
      test_requirements_file:
        description: 'Path to requirements-test.txt'
        required: false
        default: 'requirements-test.txt'
        type: string
      django_settings_module:
        description: 'Django settings module for tests'
        required: false
        default: 'config.settings.test'
        type: string
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: false
        type: boolean
      enable_security_scan:
        description: 'Run pip-audit security scan'
        required: false
        default: true
        type: boolean
      run_contract_tests:
        description: 'Run contract tests (only on main)'
        required: false
        default: false
        type: boolean
      platform_context_version:
        description: 'platform-context[testing] version to install (empty = skip)'
        required: false
        default: '>=0.7.0'
        type: string
      pytest_workers:
        # 'auto' = 1 Worker/Core = 12 auf dem geteilten Runner-Host (12 Cores,
        # 22GB, 25 Repo-Runner) — crashte reproduzierbar mit memcg-OOM
        # ('node down: Not properly terminated'): weltenhub 2026-07-10 (2×),
        # cad-hub Run 29101278323. '4' ist der host-verträgliche Default;
        # Repos auf dediziertem Runner können weiterhin explizit 'auto' setzen.
        description: 'Number of parallel pytest workers (default: 4 — host-safe on shared runners)'
        required: false
        default: '4'
        type: string
      run_migrations:
        description: 'Run unit tests WITH migrations (drop --no-migrations). Required for django-tenants repos — Tenant-Schema-Tabellen entstehen nur per migrate_schemas.'
        required: false
        default: false
        type: boolean
      ruff_version:
        description: 'Pinned ruff version to install (e.g. ==0.15.4). Empty = latest. Pin to match pyproject.toml required-version.'
        required: false
        default: '==0.15.4'
        type: string
      enable_qm_gate:
        description: 'QM Gate: Block ASSUMPTION[unverified] in .py files (ADR-174). Skipped on draft PRs.'
        required: false
        default: false
        type: boolean
      runs_on:
        description: 'Runner label (default: self-hosted). Override with ubuntu-latest if no runner registered.'
        required: false
        default: 'self-hosted'
        type: string
      src_dir:
        description: 'Directory containing manage.py (default: . for repo root, use src for risk-hub)'
        required: false
        default: '.'
        type: string
      postgres_image:
        description: 'Postgres service image. Override to "pgvector/pgvector:pg16" for repos that need the vector extension (aifw, ausschreibungs-hub, bfagent, iil-enrichment).'
        required: false
        default: 'postgres:16-alpine'
        type: string
      lint_soft_fail:
        description: 'Make Lint & Format non-blocking (job runs + annotates but does not fail the workflow). For consumers that gate deploy on secrets/tests, not lint (mcp-hub #78). Default false = lint hard-fails.'
        required: false
        default: false
        type: boolean
      migrations_smoke:
        description: 'Opt-in: run a lightweight migration smoke (migrate + makemigrations --check) even when skip_tests=true. For repos whose tests only run locally (skip_tests) but whose migrations must still be CI-verified — e.g. trading-hub TimescaleDB hypertables. Set postgres_image to a matching image (timescale/timescaledb:latest-pg16) if the migrations need an extension.'
        required: false
        default: false
        type: boolean

jobs:
  qm-gate:
    name: "QM Gate — ASSUMPTION Check (ADR-174)"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ inputs.enable_qm_gate && github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v6
      - name: Block unverified assumptions
        run: |
          set -euo pipefail
          COUNT=$(grep -rnF "ASSUMPTION[unverified]" --include="*.py" . 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "::error title=QM Gate::$COUNT offene ASSUMPTION[unverified] — vor Merge auflösen"
            grep -rnF "ASSUMPTION[unverified]" --include="*.py" . | \
              while IFS=: read file line content; do
                echo "::error file=$file,line=$line::ASSUMPTION[unverified]: $content"
              done
            exit 1
          fi
          echo "✅ QM Gate: Keine offenen Assumptions ($COUNT)"

  lint:
    name: "Lint & Format"
    runs-on: ${{ inputs.runs_on }}
    # When lint_soft_fail=true the job still runs + annotates, but a failure
    # does not fail the workflow (so consumers can gate deploy on secrets/tests
    # without lint debt blocking them — mcp-hub #78). gitleaks stays hard.
    continue-on-error: ${{ inputs.lint_soft_fail }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install ruff
        run: pip install "ruff${{ inputs.ruff_version }}"
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .
      - name: Legacy-Stub-Dist-Warnung (KONZ-018 W0-2, non-blocking)
        # Das PyPI-Paket `aifw` ist ein STALE-STUB (0.5.0) — echte Dist ist
        # `iil-aifw` (Warnung: install-iil-packages action.yml). Repos, die den
        # Legacy-Namen pinnen, laufen auf ~8 Monate altem Framework-Stand
        # (Kohorte 2026-07-12: cad-hub, 137-hub, trading-hub). Warn-only;
        # blocking erst nach 2 Wochen ohne False-Positive (Konzept-Gate).
        run: |
          hits=$(grep -rnE '^\s*aifw\s*[><=]' --include='requirements*.txt' --include='pyproject.toml' . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::warning title=Legacy-Stub-Dist 'aifw' gepinnt::Das PyPI-Paket 'aifw' ist ein veralteter Stub (0.5.0) — auf 'iil-aifw>=0.11.4,<1' migrieren (KONZ-platform-018 W0-1). Fundstellen: $hits"
          fi

  secrets-scan:
    name: "Secret Detection (gitleaks)"
    runs-on: ${{ inputs.runs_on }}
    # Blocking gate: a secrets scanner that silently goes green helps no one.
    # NOTE: deliberately NO job-level `permissions:` block and NO GitHub API
    # call. A called reusable workflow can only NARROW the caller's
    # GITHUB_TOKEN, never grant — requesting a scope the caller's run-token
    # lacks rejects the whole run at startup (startup_failure, no jobs, no
    # annotation) for every consumer repo (see #191/#198). The shared
    # `gitleaks-scan` composite action runs the gitleaks CLI against full
    # local history — zero GitHub API, zero token/permission coupling,
    # immune to caller config.
    #
    # ADR-226: this logic now lives ONCE in the composite action and is
    # consumed identically by _ci-python.yml + _ci-pypi.yml (history + built
    # sdist). ESCAPE HATCH for false positives / pre-existing history leaks:
    # repo-root `.gitleaksignore` (fingerprint, preferred) or `.gitleaks.toml`
    # (rule allowlist), auto-honored and echoed by the action. Template:
    # platform docs/templates/.gitleaks.toml.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret scan (git history)
        uses: iilgmbh/shared-ci/.github/actions/gitleaks-scan@main
        with:
          mode: history
          source: .
          context_label: "git history"

  security:
    name: "Security Scan (pip-audit + pip check)"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ inputs.enable_security_scan }}
    continue-on-error: true        # Job blockiert Deploy nicht — aber Output ist sichtbar
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Git-Auth für private Deps (ephemer, self-hosted-safe)
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          # pip / pip-audit müssen private git+https-Deps (z.B. iil-Org) klonen.
          # Token in eine JOB-temporäre gitconfig schreiben statt ~/.gitconfig —
          # self-hosted Runner persistieren das globale gitconfig sonst (Token-Leak).
          # Via GIT_CONFIG_GLOBAL gilt sie für alle Folge-Steps und verschwindet
          # mit RUNNER_TEMP.
          if [ -n "$PROJECT_PAT" ]; then
            cfg="${RUNNER_TEMP}/ci-git-auth.gitconfig"
            git config --file "$cfg" \
              url."https://x-access-token:${PROJECT_PAT}@github.com/".insteadOf "https://github.com/"
            echo "GIT_CONFIG_GLOBAL=$cfg" >> "$GITHUB_ENV"
            echo "✅ Git-Auth für private Deps aktiv (ephemer)"
          else
            echo "ℹ️  Kein PROJECT_PAT — private git-Deps werden ggf. nicht aufgelöst"
          fi
      - name: Install dependencies
        run: |
          pip install pip-audit
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip install -r ${{ inputs.requirements_file }} -q
          fi
      - name: pip check — Dependency-Konflikte
        run: |
          pip check && echo "✅ Keine Dependency-Konflikte" || {
            echo "❌ Dependency-Konflikte gefunden — bitte requirements.txt prüfen"
            exit 1
          }
      - name: pip-audit — CVE-Scan
        run: |
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip-audit -r ${{ inputs.requirements_file }} --format=columns \
              && echo "✅ Keine bekannten CVEs" \
              || echo "⚠️  CVEs gefunden — siehe Output oben (kein Hard-Fail)"
          else
            echo "Kein ${{ inputs.requirements_file }} — pip-audit übersprungen"
          fi
      - name: Pinning-Check — iil-packages Upper-Bound
        run: |
          python3 - <<'PYEOF'
          import re, sys
          from pathlib import Path
          req_file = Path("${{ inputs.requirements_file }}")
          if not req_file.exists():
              print("Kein requirements.txt — Pinning-Check übersprungen")
              sys.exit(0)
          IIL_RE = re.compile(r"^(iil-\w+|aifw|promptfw|authoringfw|weltenfw|nl2cadfw)")
          UPPER_RE = re.compile(r"<\s*\d")
          UNPINNED_RE = re.compile(r"^([a-zA-Z0-9_\-]+)\s*$")
          warns = []
          for line in req_file.read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#") or line.startswith("-"):
                  continue
              pkg = re.split(r"[=><!\[]", line)[0].strip()
              if UNPINNED_RE.match(line):
                  warns.append(f"  ⚠️  '{pkg}' — keine Versionsangabe")
              if IIL_RE.match(pkg) and not UPPER_RE.search(line):
                  warns.append(f"  ⚠️  '{pkg}' — fehlt Upper-Bound (<1) laut iil-packages Regel")
          if warns:
              print(f"Pinning-Warnungen in {req_file}:")
              print("\n".join(warns))
          else:
              print(f"✅ Alle Packages in {req_file} korrekt gepinnt")
          PYEOF

  test-unit:
    name: "Unit Tests"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432  # ephemer: Docker wählt freien Host-Port (shared-ci#8)
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install iil-packages + deps
        uses: iilgmbh/shared-ci/.github/actions/install-iil-packages@main
        with:
          project_pat: ${{ secrets.PROJECT_PAT }}
          requirements_file: ${{ inputs.requirements_file }}
          test_requirements_file: ${{ inputs.test_requirements_file }}
          platform_context_version: ${{ inputs.platform_context_version }}
      - name: Run unit tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          WORKERS=${{ inputs.pytest_workers }}
          # django-tenants-Repos brauchen echte Migrationen (Tenant-Schema-Tabellen
          # entstehen nur per migrate_schemas) → --no-migrations nur, wenn run_migrations=false.
          MIGRATIONS_FLAG="--no-migrations"
          if [ "${{ inputs.run_migrations }}" = "true" ]; then MIGRATIONS_FLAG=""; fi
          if [ "$WORKERS" = "1" ] || [ "$WORKERS" = "0" ]; then
            pytest -m "not integration and not contract and not slow" \
              $MIGRATIONS_FLAG \
              --cov \
              --cov-report=xml:coverage-unit.xml \
              --cov-report=term-missing
          else
            pytest -m "not integration and not contract and not slow" \
              $MIGRATIONS_FLAG \
              --cov \
              --cov-report=xml:coverage-unit.xml \
              --cov-report=term-missing \
              -n "$WORKERS" \
              --dist=loadscope
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ${{ inputs.src_dir }}/coverage-unit.xml

  test-integration:
    name: "Integration Tests"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432  # ephemer: Docker wählt freien Host-Port (shared-ci#8)
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install iil-packages + deps
        uses: iilgmbh/shared-ci/.github/actions/install-iil-packages@main
        with:
          project_pat: ${{ secrets.PROJECT_PAT }}
          requirements_file: ${{ inputs.requirements_file }}
          test_requirements_file: ${{ inputs.test_requirements_file }}
          platform_context_version: ${{ inputs.platform_context_version }}
      - name: Migration Graph Check
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          set -euo pipefail
          python manage.py migrate 2>&1 && echo "OK: Migration graph consistent — all migrations applied" || {
            echo "FAIL: Migration graph inconsistent — broken or conflicting migrations detected!"
            python manage.py showmigrations 2>&1 | grep -E '^\s+\[ \]' || true
            exit 1
          }

      - name: AppConfig Label Check
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        run: |
          set -euo pipefail
          python manage.py check --deploy --fail-level ERROR 2>&1 || {
            echo "FAIL: Django system check failed!"
            exit 1
          }
          echo "OK: Django system check passed"

      - name: Run integration tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
          REDIS_URL: redis://localhost:6379/0
        run: |
          WORKERS=${{ inputs.pytest_workers }}
          set +e
          if [ "$WORKERS" = "1" ] || [ "$WORKERS" = "0" ]; then
            pytest -m "integration" \
              --cov \
              --cov-report=xml:coverage-integration.xml
          else
            pytest -m "integration" \
              --cov \
              --cov-report=xml:coverage-integration.xml \
              -n "$WORKERS" \
              --dist=loadscope
          fi
          EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 5 ]; then
            echo "No integration tests collected — creating empty coverage report"
            echo '<?xml version="1.0" ?><coverage version="7.0" timestamp="0" lines-valid="1" lines-covered="1" line-rate="1.0" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0"><packages></packages></coverage>' > coverage-integration.xml
            exit 0
          fi
          exit $EXIT_CODE
      - name: Create empty coverage if missing
        if: always()
        run: |
          if [ ! -f ${{ inputs.src_dir }}/coverage-integration.xml ]; then
            echo '<?xml version="1.0" ?><coverage version="7.0" timestamp="0" lines-valid="1" lines-covered="1" line-rate="1.0" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0"><packages></packages></coverage>' > ${{ inputs.src_dir }}/coverage-integration.xml
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: ${{ inputs.src_dir }}/coverage-integration.xml

  coverage-report:
    name: "Coverage Gate (≥${{ inputs.coverage_threshold }}%)"
    runs-on: ${{ inputs.runs_on }}
    needs: [test-unit, test-integration]
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: coverage-unit
      - uses: actions/download-artifact@v8
        with:
          name: coverage-integration
      - name: Merge and enforce coverage gate
        run: |
          pip install coverage --break-system-packages || pip install coverage
          python3 -m coverage combine coverage-unit.xml coverage-integration.xml 2>/dev/null || true
          python3 -m coverage report --fail-under=${{ inputs.coverage_threshold }} 2>/dev/null || echo "Coverage data unavailable — skipping gate (threshold=${{ inputs.coverage_threshold }}%)"

  test-contract:
    name: "Contract Tests"
    runs-on: ${{ inputs.runs_on }}
    needs: [test-unit, test-integration]
    if: ${{ inputs.run_contract_tests && !inputs.skip_tests }}
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432  # ephemer: Docker wählt freien Host-Port (shared-ci#8)
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install iil-packages + deps
        uses: iilgmbh/shared-ci/.github/actions/install-iil-packages@main
        with:
          project_pat: ${{ secrets.PROJECT_PAT }}
          requirements_file: ${{ inputs.requirements_file }}
          test_requirements_file: ${{ inputs.test_requirements_file }}
          platform_context_version: ${{ inputs.platform_context_version }}
      - name: Install iil-testkit contract module (ADR-155)
        run: pip install "iil-testkit>=0.3.0"
      - name: Run contract tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: ${{ job.services.postgres.ports['5432'] }}
        # Exit 5 (pytest: keine Tests eingesammelt) wird bewusst als grün behandelt —
        # nicht jedes Repo hat schon Contract-Tests (analog zum Integration-Job).
        # Anders als das entfernte `continue-on-error` oben maskiert das KEINE echte
        # Testassertion: ein tatsächlich fehlgeschlagener Contract-Test bricht mit
        # einem Exit-Code ≠ 0/5 ab und propagiert normal (platform#846, "dokumentieren
        # statt härten" — Repos ohne Contract-Tests sollen nicht deswegen rot werden).
        run: pytest -m "contract" -v || ([ $? -eq 5 ] && echo "No contract tests found, skipping." && exit 0)

  architecture-guardian:
    name: "Architecture Guardian (ADR-155)"
    runs-on: ${{ inputs.runs_on }}
    needs: [lint]
    if: ${{ inputs.run_contract_tests && !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: "Architecture Fitness Functions (import-linter, ADR-009/041)"
        run: |
          pip install import-linter --quiet
          if [ -f ".importlinter" ]; then
            lint-imports --debug 2>&1 || {
              echo "❌ Architecture Fitness Function verletzt — ADR-009 Service Layer Check"
              echo "Details: import-linter prüft Views→Models-Imports (ADR-009)"
              echo "Fix: ORM-Zugriff aus views.py in services.py verlagern"
              exit 1
            }
            echo "✅ Architecture Fitness Functions OK"
          else
            echo "ℹ️  Kein .importlinter gefunden — Fitness Functions übersprungen"
            echo "    Template: platform/docs/templates/.importlinter"
          fi
      - name: Install platform-context
        run: pip install "iil-platform-context>=0.5.0" || pip install "platform-context>=0.3.1" || true
      - name: "Check: No blind **kwargs forwarding (ADR-155 §4.3)"
        run: |
          python3 << 'GUARDIAN_EOF'
          import sys
          from pathlib import Path
          try:
              from platform_context.checks.no_kwargs_forwarding import check
              violations = check(Path('.'))
              if violations:
                  print(f'ADR-155: {len(violations)} **kwargs violation(s):')
                  for v in violations:
                      print(f'  {v["message"]}')
                  sys.exit(1)
              else:
                  print('ADR-155: No **kwargs forwarding in adapters.')
          except ImportError:
              print('platform_context.checks not available -- skipping guardian check')
              sys.exit(0)
          GUARDIAN_EOF

  runner-label-check:
    name: "Runner-Label-Check"
    # Bewusst GitHub-hosted: ein Gate gegen tote self-hosted-Runner-Label-Pins darf
    # NICHT selbst von einem self-hosted-Runner abhängen (sonst hängt es genauso).
    # Hintergrund: 2026-06-17 hing complete-check.yml 13h, weil auf [self-hosted,
    # hetzner] gepinnt (hetzner trug nur ein verwaister offline-Runner) → blockierte
    # ALLE risk-hub-Merges. Konvention/SoT: platform/infra/hosts.yaml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install PyYAML
        run: pip install pyyaml
      - name: "Keine toten self-hosted-Label-Pins"
        run: |
          python3 - <<'PY'
          import sys, glob, yaml
          # Labels, die jeder self-hosted Runner automatisch trägt:
          AUTO = {"self-hosted", "linux", "x64"}
          # Erlaubte Zusatz-Labels (leer = nur plain self-hosted). Bei neuem dedizierten
          # Runner: hier UND in platform/infra/hosts.yaml (status: online) ergänzen.
          ALLOWED_EXTRA = set()
          HOSTED = ("ubuntu", "windows", "macos")
          issues = []
          for wf in sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")):
              try:
                  doc = yaml.safe_load(open(wf).read()) or {}
              except yaml.YAMLError as e:
                  issues.append(f"{wf}: YAML nicht parsebar ({e})")
                  continue
              for job_id, job in (doc.get("jobs", {}) or {}).items():
                  if not isinstance(job, dict):
                      continue
                  ro = job.get("runs-on")
                  labels = [ro] if isinstance(ro, str) else (ro or [])
                  low = {str(x).lower() for x in labels}
                  if any(any(l.startswith(h) for h in HOSTED) for l in low):
                      continue
                  if "self-hosted" not in low:
                      continue
                  extra = {str(x) for x in labels if str(x).lower() not in AUTO and str(x) not in ALLOWED_EXTRA}
                  if extra:
                      issues.append(
                          f"{wf}: job '{job_id}' runs-on {labels} — Zusatz-Label {sorted(extra)} "
                          f"ist nicht garantiert von einem Online-Runner gedeckt (toter-Pin-Risiko, "
                          f"blockiert Merges). Fix: runs-on: self-hosted (SoT: platform/infra/hosts.yaml)."
                      )
          if issues:
              print(f"::error::Runner-Label-Check: {len(issues)} Finding(s)")
              for i in issues:
                  print(f"  - {i}")
              sys.exit(1)
          print("OK — kein self-hosted-Workflow nutzt ein ungedecktes Runner-Label.")
          PY

  migrations-smoke:
    name: "Migrations Smoke (opt-in)"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ inputs.migrations_smoke }}
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install iil-packages + deps
        uses: iilgmbh/shared-ci/.github/actions/install-iil-packages@main
        with:
          project_pat: ${{ secrets.PROJECT_PAT }}
          requirements_file: ${{ inputs.requirements_file }}
          test_requirements_file: ${{ inputs.test_requirements_file }}
          platform_context_version: ${{ inputs.platform_context_version }}
      - name: Migrate + makemigrations --check (smoke)
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          # Beide Namens-Konventionen setzen: POSTGRES_* (shared-Default) und DB_*
          # (z.B. trading-hub settings.py). Service mappt 5432:5432.
          POSTGRES_HOST: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
        run: |
          set -euo pipefail
          python manage.py migrate 2>&1 && echo "OK: alle Migrationen sauber angewandt (inkl. RunSQL/create_hypertable)" || {
            echo "FAIL: migrate fehlgeschlagen — kaputte/konfligierende Migration oder fehlende DB-Extension"
            exit 1
          }
          python manage.py makemigrations --check --dry-run 2>&1 && echo "OK: keine ungetrackte Model-Drift" || {
            echo "FAIL: makemigrations --check — Model/Migration-Drift (fehlende Migration committen)"
            exit 1
          }

  gate:
    name: "gate"
    runs-on: ${{ inputs.runs_on }}
    needs: [qm-gate, lint, secrets-scan, security, test-unit, test-integration, coverage-report, test-contract, architecture-guardian, runner-label-check, migrations-smoke]
    if: always()
    steps:
      - name: "All CI jobs passed or skipped"
        run: |
          STATUS_LIST='${{ toJSON(needs) }}'
          echo "$STATUS_LIST" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failures = [name for name, job in needs.items() if job['result'] not in ('success', 'skipped')]
          if failures:
              print('::error::Failed or cancelled jobs:', failures)
              sys.exit(1)
          print('All jobs passed or were skipped.')
          "
