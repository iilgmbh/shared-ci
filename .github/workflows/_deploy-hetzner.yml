# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: Hetzner VM Deployment (v2)                             ║
# ║  Uses deploy-remote.sh on VM — migration gate, healthcheck, auto-rollback ║
# ║  Usage: uses: iilgmbh/shared-ci/.github/workflows/_deploy-hetzner.yml@main
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: Deploy to Hetzner

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application name (e.g. bfagent)'
        required: true
        type: string
      deploy_path:
        description: 'Deployment directory on server (e.g. /srv/bfagent)'
        required: true
        type: string
      health_url:
        description: 'External health check URL (e.g. https://app.example.com/healthz/)'
        required: true
        type: string
      compose_file:
        description: 'Docker Compose file name'
        required: false
        default: 'docker-compose.prod.yml'
        type: string
      env_file:
        description: 'Environment file name'
        required: false
        default: '.env.prod'
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: ''
        type: string
      web_service:
        description: 'Web service name in compose (default: <app>-web)'
        required: false
        default: ''
        type: string
      environment:
        description: 'Target environment (staging|production)'
        required: false
        default: 'production'
        type: string
      health_check_retries:
        description: 'Number of health check retries'
        required: false
        default: 12
        type: number
      health_check_interval:
        description: 'Seconds between health checks'
        required: false
        default: 5
        type: number
      enable_rollback:
        description: 'Enable automatic rollback on failure'
        required: false
        default: true
        type: boolean
      run_migrations:
        description: 'Run database migrations (expand phase)'
        required: false
        default: true
        type: boolean
      skip_backup:
        description: 'Skip pre-deploy DB backup'
        required: false
        default: false
        type: boolean
      notify_slack:
        description: 'Send Slack notifications'
        required: false
        default: false
        type: boolean
      extra_deploy_args:
        description: 'Extra flags passed to deploy-remote.sh (e.g. --django-tenants)'
        required: false
        default: ''
        type: string
      skip_external_verify:
        description: 'Skip the external belt+suspenders health check in the verify job (e.g. health_url sits behind an auth gate like Cloudflare Access and can structurally never return 200 from a GitHub-hosted runner). The internal healthcheck with rollback in deploy-remote.sh still runs and still gates the deploy — this only silences the separate, non-blocking external probe.'
        required: false
        default: false
        type: boolean
    secrets:
      HETZNER_HOST:
        required: true
      HETZNER_USER:
        required: true
      HETZNER_SSH_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      SOPS_AGE_KEY:
        required: false
      PROJECT_PAT:
        required: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # SECRETS: SOPS decrypt → push to /run/secrets/ on server (ADR-045 Phase 5)
  # Skipped if SOPS_AGE_KEY is not set (backward compat during migration)
  # ─────────────────────────────────────────────────────────────────────────
  secrets:
    name: "Decrypt & push secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check SOPS_AGE_KEY available
        id: sops_check
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "${SOPS_AGE_KEY:-}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ SOPS_AGE_KEY not set — skipping secrets deploy (backward compat)"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sops
        if: steps.sops_check.outputs.has_key == 'true' && hashFiles('secrets.enc.env') != ''
        run: |
          curl -sLo /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64"
          chmod +x /usr/local/bin/sops

      - name: Decrypt secrets.enc.env → /run/secrets/ on server
        if: steps.sops_check.outputs.has_key == 'true' && hashFiles('secrets.enc.env') != ''
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_USER }}
        run: |
          set -euo pipefail

          # Decrypt in runner memory — never written to disk as plaintext
          decrypted=$(sops -d --input-type dotenv --output-type dotenv secrets.enc.env)

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Create /run/secrets/ on server (sudo needed — /run is root-owned)
          $SSH "sudo mkdir -p /run/secrets && sudo chown ${DEPLOY_USER}:${DEPLOY_USER} /run/secrets && chmod 700 /run/secrets"

          # Write each secret as individual file (pipe via stdin — safe for quotes/special chars)
          count=0
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* ]] && continue
            key_lower=$(echo "$key" | tr '[:upper:]' '[:lower:]')
            # Strip surrounding quotes from value if present
            value="${value#\'}" ; value="${value%\'}"
            value="${value#\"}" ; value="${value%\"}"
            printf '%s' "$value" | $SSH "rm -f /run/secrets/${key_lower} && cat > /run/secrets/${key_lower} && chmod 400 /run/secrets/${key_lower}"
            count=$((count + 1))
          done <<< "$decrypted"

          echo "✅ Deployed ${count} secrets to /run/secrets/ on ${DEPLOY_HOST}"

      - name: Verify required secrets
        if: steps.sops_check.outputs.has_key == 'true' && hashFiles('secrets.enc.env') != ''
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
          DEPLOY_USER: ${{ secrets.HETZNER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"

          $SSH 'for f in secret_key postgres_password; do
            if [ ! -s "/run/secrets/$f" ]; then
              echo "FATAL: Missing or empty secret: $f" >&2
              exit 1
            fi
          done
          echo "✅ Required secrets verified."'

  # ─────────────────────────────────────────────────────────────────────────
  # DEPLOY via deploy-remote.sh (handles lock, backup, migrate, restart,
  #   healthcheck, rollback — all in one atomic script)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy ${{ inputs.app_name }}"
    runs-on: ubuntu-latest
    needs: [secrets]
    if: always() && (needs.secrets.result == 'success' || needs.secrets.result == 'skipped')
    environment: ${{ inputs.environment }}
    outputs:
      deployed_tag: ${{ steps.tag.outputs.tag }}
      exit_code: ${{ steps.run.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v6

      - name: Pre-flight lint (ADR-054 M1)
        run: |
          set -euo pipefail
          ERRORS=0

          # Check 1: Keine Cross-Repo COPY in Dockerfile
          if [ -f "Dockerfile" ]; then
            if grep -qE "^COPY packages/" Dockerfile 2>/dev/null; then
              echo "::error::Cross-repo COPY in Dockerfile gefunden (ADR-054 M4: platform_context als Package installieren)"
              grep -nE "^COPY packages/" Dockerfile
              ERRORS=$((ERRORS+1))
            fi
          fi

          # Check 2: Compose-Datei vorhanden
          if [ ! -f "${{ inputs.compose_file }}" ]; then
            echo "::error::Compose-Datei nicht gefunden: ${{ inputs.compose_file }}"
            ERRORS=$((ERRORS+1))
          fi

          # Check 3: Keine absoluten lokalen Pfade in pyproject.toml
          for f in pyproject.toml requirements.txt; do
            if [ -f "$f" ] && grep -qE "file://|/home/|/opt/|/srv/" "$f" 2>/dev/null; then
              echo "::error::Absolute lokale Pfade in ${f} — bricht CI (ADR-054 M4)"
              grep -nE "file://|/home/|/opt/|/srv/" "$f"
              ERRORS=$((ERRORS+1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Pre-flight: ${ERRORS} Problem(e) — Deploy abgebrochen"
            exit 1
          fi
          echo "✅ Pre-flight lint: OK"

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync deploy script to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: deployment/scripts/deploy-remote.sh
          target: ${{ inputs.deploy_path }}/scripts/
          strip_components: 2

      - name: Execute deploy
        id: run
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ github.token }}
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN,PROJECT_PAT
          script: |
            set -euo pipefail
            chmod +x "${{ inputs.deploy_path }}/scripts/deploy-remote.sh"
            ENV_FILE="${{ inputs.deploy_path }}/${{ inputs.env_file }}"
            # Inject GHCR_TOKEN into env file for docker login in deploy-remote.sh
            if [ -n "${GHCR_TOKEN:-}" ]; then
              if grep -q "^GHCR_TOKEN=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^GHCR_TOKEN=.*|GHCR_TOKEN=${GHCR_TOKEN}|" "$ENV_FILE"
              else
                echo "GHCR_TOKEN=${GHCR_TOKEN}" >> "$ENV_FILE"
              fi
            fi
            # Inject PROJECT_PAT as GITHUB_TOKEN for ADR-055 Bug-Report → GitHub Issue creation
            if [ -n "${PROJECT_PAT:-}" ]; then
              if grep -q "^GITHUB_TOKEN=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^GITHUB_TOKEN=.*|GITHUB_TOKEN=${PROJECT_PAT}|" "$ENV_FILE"
              else
                echo "GITHUB_TOKEN=${PROJECT_PAT}" >> "$ENV_FILE"
              fi
            fi

            EXTRA_ARGS="${{ inputs.extra_deploy_args }}"
            if [ "${{ inputs.run_migrations }}" = "false" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --skip-migrate"
            fi
            if [ "${{ inputs.skip_backup }}" = "true" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --skip-backup"
            fi
            WEB_SVC="${{ inputs.web_service }}"
            if [ -n "$WEB_SVC" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --web-service $WEB_SVC"
            fi

            "${{ inputs.deploy_path }}/scripts/deploy-remote.sh" \
              --app "${{ inputs.app_name }}" \
              --tag "${{ steps.tag.outputs.tag }}" \
              --deploy-dir "${{ inputs.deploy_path }}" \
              --compose-file "${{ inputs.compose_file }}" \
              --env-file "${{ inputs.env_file }}" \
              --health-retries "${{ inputs.health_check_retries }}" \
              --health-interval "${{ inputs.health_check_interval }}" \
              $EXTRA_ARGS

  # ─────────────────────────────────────────────────────────────────────────
  # VERIFY: External health check (belt + suspenders)
  # ─────────────────────────────────────────────────────────────────────────
  verify:
    name: "Verify"
    needs: [deploy]
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: External health check
        id: health
        run: |
          if [ "${{ inputs.skip_external_verify }}" = "true" ]; then
            echo "ℹ️ External health check skipped (skip_external_verify=true) — internal healthcheck with rollback already ran and gated the deploy job."
            echo "healthy=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for i in $(seq 1 5); do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' \
              "${{ inputs.health_url }}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ External health check passed"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE"
            sleep 10
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "::warning::External health check failed"

  # ─────────────────────────────────────────────────────────────────────────
  # NOTIFY + SUMMARY
  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: "Notify"
    needs: [deploy, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Job summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | ${{ inputs.app_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ needs.deploy.outputs.deployed_tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Env | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify | ${{ needs.verify.outputs.healthy }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Slack notification
        if: ${{ inputs.notify_slack }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.deploy.result }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${EMOJI} ${{ inputs.app_name }} (${{ inputs.environment }}): ${STATUS} — tag ${{ needs.deploy.outputs.deployed_tag }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
