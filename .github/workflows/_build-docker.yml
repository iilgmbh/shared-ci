# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: Docker Build & Push                                    ║
# ║  Usage: uses: iilgmbh/shared-ci/.github/workflows/_build-docker.yml@v1 ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
# ⚠️ CONSTRAINT: Reusable workflows (workflow_call) support permissions ONLY
#    at workflow-level, NOT at job-level. Job-level permissions cause
#    startup_failure (0 jobs, no logs). Callers should also set permissions.

name: Docker Build

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        default: 'Dockerfile'
        type: string
      context:
        description: 'Build context'
        required: false
        default: '.'
        type: string
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64'
        type: string
      image_name:
        description: 'Override image name (default: repo name)'
        required: false
        default: ''
        type: string
      scan_image:
        description: 'Run Trivy vulnerability scan'
        required: false
        default: true
        type: boolean
      push:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
    outputs:
      image_tag:
        description: 'The pushed image tag (SHA)'
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: 'The image digest'
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          if [ -n "${{ inputs.image_name }}" ]; then
            echo "name=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        if: ${{ inputs.scan_image }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        if: ${{ inputs.scan_image }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
