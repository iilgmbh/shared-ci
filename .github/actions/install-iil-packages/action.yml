# Composite Action: Install iil-packages (aifw, promptfw, authoringfw, weltenfw, nl2cad, fieldprefill)
# DRY extraction from _ci-python.yml — used in test-unit, test-integration, test-contract
name: "Install iil-packages"
description: "Install IIL private packages with fallback to legacy names"

inputs:
  project_pat:
    description: "GitHub PAT for private repos (iil-fieldprefill)"
    required: false
    default: ""
  requirements_file:
    description: "Path to requirements.txt"
    required: false
    default: "requirements.txt"
  test_requirements_file:
    description: "Path to requirements-test.txt"
    required: false
    default: "requirements-test.txt"
  platform_context_version:
    description: "platform-context[testing] version constraint"
    required: false
    default: ">=0.3.1"

runs:
  using: "composite"
  steps:
    - name: Create job-local venv (REC-1 / platform#357)
      shell: bash
      # Self-hosted runners share a persistent setup-python tool-cache.
      # A job-local venv in $RUNNER_TEMP gives each job its own site-packages
      # while still sharing the pip wheel/download cache — eliminating the
      # shared-mutable-state race that caused stale-code flakiness (PR #354).
      # Adding to GITHUB_PATH makes this venv's pip/python the default for all
      # subsequent steps in this action AND in the calling workflow.
      run: |
        python -m venv "$RUNNER_TEMP/iil-venv"
        echo "$RUNNER_TEMP/iil-venv/bin" >> "$GITHUB_PATH"
        "$RUNNER_TEMP/iil-venv/bin/pip" install --upgrade pip --quiet

    - name: Install requirements
      shell: bash
      run: |
        pip install -r ${{ inputs.requirements_file }}
        if [ -f "${{ inputs.test_requirements_file }}" ]; then
          pip install -r ${{ inputs.test_requirements_file }}
        fi

    - name: Install iil-packages (aifw, promptfw, authoringfw, weltenfw, nl2cad, fieldprefill)
      shell: bash
      env:
        PROJECT_PAT: ${{ inputs.project_pat }}
      # --force-reinstall --no-deps: self-hosted runners share a PERSISTENT
      # setup-python tool-cache. A prior partial/concurrent install can leave an
      # iil-package with CURRENT metadata (e.g. iil-aifw 0.10.2 in .dist-info)
      # but STALE code in __init__.py — missing newer public-API symbols. Plain
      # `pip install` then sees "already satisfied" and never repairs it, so
      # contract tests fail intermittently (missing get_action_config/QualityLevel/
      # AIFWError, 'LLMResult' has no 'as_json', …). Forcing a code-level reinstall
      # makes the installed code always match the pin, regardless of cache state.
      # --no-deps keeps it fast (deps already resolved by requirements.txt above).
      run: |
        # Presence + code-freshness for the iil family (covers repos that do
        # not pin them in requirements.txt). `python -m pip` ensures the install
        # hits the SAME interpreter the tests use.
        #
        # PER-PACKAGE (not one bundled `pip install A B C…`): pip is all-or-nothing,
        # so a single unavailable package (e.g. iil-nl2cad on a given index) would
        # fail the WHOLE iil group and drop to the legacy fallback — which installs
        # the stale `aifw 0.5.0` STUB over a good iil-aifw 0.10.3, leaving
        # metadata=0.10.3 / code=0.5.0 (the freshness probe then correctly errors).
        # Installing each independently lets iil-aifw force-reinstall (repairing
        # stale code) regardless of its siblings; legacy is tried ONLY if the
        # iil-prefixed name itself is unavailable. See platform#419.
        for spec in \
          "iil-aifw>=0.5.0,<1|aifw>=0.5.0,<1" \
          "iil-promptfw>=0.5.1,<1|promptfw>=0.2.0,<1" \
          "iil-authoringfw>=0.3.0,<1|authoringfw>=0.3.0,<1" \
          "iil-weltenfw>=0.1.0,<1|weltenfw>=0.1.0,<1" \
          "iil-nl2cad>=0.1.0,<1|"; do
          iil="${spec%%|*}"; legacy="${spec##*|}"
          python -m pip install --force-reinstall --no-deps "$iil" 2>/dev/null && continue
          [ -n "$legacy" ] && python -m pip install --force-reinstall --no-deps "$legacy" 2>/dev/null || true
        done
        # Authoritative: re-assert the consumer's requirements.txt pins so the
        # looser ranges above can never override an intended cap (e.g. a repo
        # pinning iil-aifw<0.11 must not get a future 0.11 from here). A pinned
        # spec that fails to install is FATAL here (no `|| true`).
        if [ -f "${{ inputs.requirements_file }}" ]; then
          pins=$(grep -iE '^(iil-aifw|iil-promptfw|iil-authoringfw|iil-weltenfw|iil-nl2cad)([<>=!~ ]|$)' \
                 "${{ inputs.requirements_file }}" || true)
          if [ -n "$pins" ]; then
            printf '%s\n' "$pins" | python -m pip install --force-reinstall --no-deps -r /dev/stdin
          fi
        else
          echo "::warning::${{ inputs.requirements_file }} not found — only the action's default iil ranges were used (no consumer pins re-asserted)."
        fi
        # Refresh git-based iil-* deps (e.g. `iil-learnfw @ git+...@main`). pip's git
        # cache + "already satisfied" leave @main/@branch refs STALE on persistent
        # self-hosted runners — same staleness class as the iil family above (a plain
        # `pip install -r` won't re-fetch @main). Walk the consumer's requirements tree
        # (following -r includes) and force-reinstall any git-based iil-* line so the
        # latest code (e.g. new API routes) lands. Surfaced by learn-hub#9: stale
        # iil-learnfw → /api/progress + /api/assessments 404.
        _collect_reqs() {
          local f="$1"; [ -f "$f" ] || return 0
          local d; d=$(dirname "$f")
          while IFS= read -r line; do
            case "$line" in
              "-r "*|"--requirement "*) _collect_reqs "$d/$(echo "$line" | awk '{print $2}')" ;;
              *) printf '%s\n' "$line" ;;
            esac
          done < "$f"
        }
        GIT_IIL=$(_collect_reqs "${{ inputs.requirements_file }}" | grep -iE 'iil-[a-z0-9_-]+(\[[a-z,]+\])? ?@ ?git\+' || true)
        if [ -n "$GIT_IIL" ]; then
          echo "Refreshing git-based iil deps:"; printf '  %s\n' "$GIT_IIL"
          printf '%s\n' "$GIT_IIL" | python -m pip install --force-reinstall --no-deps -r /dev/stdin \
            || echo "::warning::git-based iil dep refresh failed (learn-hub#9)"
        fi
        # Ensure aifw's runtime deps are present. The --no-deps installs above
        # skip them, and aifw imports `litellm` (declared dep, litellm>=1.30) at
        # module load. Consumers that don't pull litellm transitively — including
        # repos that don't use aifw but still get it from the DEFAULT list above —
        # would otherwise crash the freshness probe below with
        # `ModuleNotFoundError: No module named 'litellm'`. Guarded on aifw
        # presence; only installs litellm if it's actually missing. See platform#413.
        if python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('aifw') else 1)" 2>/dev/null; then
          python -c "import litellm" 2>/dev/null \
            || python -m pip install "litellm>=1.30" -q \
            || echo "::warning::aifw present but litellm could not be installed — freshness probe may fail (platform#413)"
        fi
        # Generic repair for --no-deps refresh holes (Audit 2026-07-04, apo-hub#38:
        # aifw 0.11.5 added `tenacity` → the hard pip-check below failed every
        # consumer without it). The litellm guard above stays (import-time dep with
        # version bound); THIS catches every future "requires X, which is not
        # installed" generically, so new aifw deps never need another hardcode.
        # `|| true` ist NICHT kosmetisch: der Step laeuft unter `-e -o pipefail`
        # (GitHub-Default fuer `shell: bash`, im Runner-Log als
        # `bash --noprofile --norc -e -o pipefail {0}` sichtbar). `pip check`
        # beendet mit 1, sobald eine Abhaengigkeit fehlt; pipefail reicht die 1
        # durch die Pipe, die Zuweisung erbt sie, set -e beendet den Step SOFORT.
        # Ohne `|| true` war dieser Block damit unerreichbar: bei kaputten Deps
        # starb das Skript eine Zeile vorher, bei heilen Deps war MISSING leer.
        # Er lief also in genau keinem Fall — belegt an wedding-hub#38
        # (iil-aifw 0.11.5 requires tenacity>=8.2, Abbruch ohne jede Ausgabe).
        MISSING=$(python -m pip check 2>&1 \
          | sed -n 's/.*requires \(.*\), which is not installed.*/\1/p' | sort -u) || true
        if [ -n "$MISSING" ]; then
          echo "::notice::repairing deps dropped by --no-deps refresh: $MISSING"
          printf '%s\n' "$MISSING" | xargs -r -n1 python -m pip install -q \
            || echo "::warning::dep repair incomplete — pip check below will fail"
        fi
        # Hard gate: job-local venv (above) guarantees a clean site-packages with
        # no pre-existing tool-cache conflicts, so pip check can now be a real
        # failure signal instead of an advisory (platform#357 landed).
        # --force-reinstall remains as belt-and-suspenders; sunset tracked in #357.
        python -m pip check
        # Freshness probe — guards the ORIGINAL flaky failure: stale tool-cache
        # code missing newer public-API symbols. Checks SYMBOLS, not __version__:
        # iil-aifw's release process leaves the wheel's in-code __version__ behind
        # the packaging version (the published 0.10.2 wheel self-reports "0.10.0"
        # while exporting the full API — see iil-aifw release-hygiene issue), so a
        # __version__==metadata check would false-positive on a correct install.
        # Guarded on presence (repos without iil-aifw skip) and version-gated:
        # only metadata >=0.10 must expose these symbols.
        python - <<'PROBE'
        import importlib.util as u, importlib.metadata as M, sys
        if u.find_spec('aifw') is None:
            sys.exit(0)
        try:
            import aifw
        except ModuleNotFoundError as e:
            # Missing *dependency* (e.g. litellm), not stale aifw code — advisory
            # only; the litellm-ensure step above should normally prevent this.
            print("::warning::aifw present but a dependency is missing (%s) — freshness probe skipped (platform#413)" % e.name)
            sys.exit(0)
        from packaging.version import Version
        # The action installs EITHER the PyPI dist `iil-aifw` OR, as a fallback,
        # the legacy dist `aifw` (see --no-deps block above). The module is `aifw`
        # in both cases, but the *distribution* name differs — so resolve metadata
        # tolerantly. If neither resolves, the staleness gate can't run → advisory.
        try:
            meta = M.version('iil-aifw')
        except M.PackageNotFoundError:
            try:
                meta = M.version('aifw')  # legacy distribution name
            except M.PackageNotFoundError:
                print("::warning::aifw module present but no iil-aifw/aifw distribution metadata — freshness probe skipped (platform#416)")
                sys.exit(0)
        print('iil-aifw metadata=%s code=%s @ %s' % (meta, getattr(aifw, '__version__', '?'), aifw.__file__))
        _m = [s for s in ('get_action_config', 'QualityLevel', 'AIFWError') if not hasattr(aifw, s)]
        if Version(meta) >= Version('0.10') and _m:
            sys.exit('::error::iil-aifw %s installed but code is STALE — missing %s (tool-cache not repaired by force-reinstall)' % (meta, _m))
        PROBE
        # iil-fieldprefill: private repo, not on PyPI (ADR-107)
        if [ -n "$PROJECT_PAT" ]; then
          pip install "git+https://x-access-token:${PROJECT_PAT}@github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
        else
          pip install "git+https://github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
        fi

    - name: Freshness probe — generic, pyproject-declared (platform:KONZ-018 W1-3)
      shell: bash
      # Generalizes the aifw-specific probe above (which stays untouched until
      # this pilot is green — KONZ-018 W1-3): each opted-in package declares its
      # stable top-level API itself in its own pyproject.toml under
      # [tool.iil-fleet] (freshness_min_version + freshness_symbols). This step
      # fetches that declaration from the package repo's main branch and fails
      # LOUD when an installed release >= freshness_min_version does not export
      # every declared symbol (stale tool-cache code class, see platform#419).
      # Safety rails (KONZ-018 R3 — no false-positive red for consumers):
      #   - packages without a [tool.iil-fleet] declaration are skipped (the
      #     probe is inert until the package-side PR lands on main),
      #   - installed releases OLDER than freshness_min_version are skipped
      #     (main may declare symbols newer than the installed wheel),
      #   - network/parse/dependency problems are ::warning + skip, never red.
      # Pilot roster: iil-promptfw only (2nd-largest package, ~14 consumers).
      run: |
        python - <<'GENPROBE'
        import importlib
        import importlib.metadata as M
        import importlib.util as u
        import sys
        import urllib.request

        try:
            import tomllib
        except ImportError:  # python < 3.11 — declaration unreadable, advisory
            print("::warning::tomllib unavailable (python < 3.11) — generic freshness probe skipped")
            sys.exit(0)
        from packaging.version import Version

        # dist, module, legacy dist name (fallback install path above), repo
        PILOTS = [
            ("iil-promptfw", "promptfw", "promptfw", "achimdehnert/promptfw"),
        ]
        failed = False
        for dist, module, legacy, repo in PILOTS:
            if u.find_spec(module) is None:
                continue  # consumer does not use this package
            try:
                meta = M.version(dist)
            except M.PackageNotFoundError:
                try:
                    meta = M.version(legacy)
                except M.PackageNotFoundError:
                    print("::warning::%s importable but no %s/%s dist metadata — freshness probe skipped" % (module, dist, legacy))
                    continue
            url = "https://raw.githubusercontent.com/%s/main/pyproject.toml" % repo
            try:
                with urllib.request.urlopen(url, timeout=10) as r:
                    fleet = tomllib.loads(r.read().decode()).get("tool", {}).get("iil-fleet") or {}
            except Exception as e:
                print("::warning::freshness declaration for %s not fetchable/parsable (%s) — probe skipped (advisory)" % (dist, e))
                continue
            symbols = fleet.get("freshness_symbols") or []
            min_v = fleet.get("freshness_min_version")
            if not symbols or not min_v:
                continue  # package not opted in (yet)
            if Version(meta) < Version(str(min_v)):
                continue  # installed release predates the declaration
            try:
                mod = importlib.import_module(module)
            except ModuleNotFoundError as e:
                print("::warning::%s present but a dependency is missing (%s) — freshness probe skipped" % (module, e.name))
                continue
            missing = [s for s in symbols if not hasattr(mod, s)]
            print("%s metadata=%s code=%s @ %s — %d declared symbols" % (dist, meta, getattr(mod, "__version__", "?"), mod.__file__, len(symbols)))
            if missing:
                print("::error::%s %s installed but code is STALE — missing %s (tool-cache not repaired by force-reinstall)" % (dist, meta, missing))
                failed = True
        sys.exit(1 if failed else 0)
        GENPROBE

    - name: Install platform-context[testing] (ADR-058)
      # PyPI-Naming: das echte Paket heißt `iil-platform-context`.
      # `platform-context` (ohne iil-Präfix) ist auf PyPI ein fremder Squatter
      # in 0.5.0 und führt zu "Could not find version" + ImportError in CI.
      # Fallback-Chain matches Architecture-Guardian Step in _ci-python.yml.
      if: ${{ inputs.platform_context_version != '' }}
      shell: bash
      run: |
        if [ -d "vendor/platform_context" ]; then
          pip install -e "vendor/platform_context[testing]"
        else
          pip install "iil-platform-context[testing]${{ inputs.platform_context_version }}" \
            || pip install "platform-context[testing]${{ inputs.platform_context_version }}" \
            || true
        fi

    - name: Install additional vendor packages
      shell: bash
      run: |
        if [ -d "vendor" ]; then
          for pkg in vendor/*/; do
            pkg_name=$(basename "$pkg")
            if [ "$pkg_name" != "platform_context" ] && [ -f "$pkg/pyproject.toml" -o -f "$pkg/setup.py" -o -f "$pkg/setup.cfg" ]; then
              echo "Installing vendor/$pkg_name..."
              pip install -e "$pkg" || true
            fi
          done
        fi
